services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: euphrate-laravel
    container_name: euphrate_app
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      APP_NAME: "Collège Privé Euphrate"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8000
      # APP_KEY: "base64:..."  # laisser vide = généré et persisté automatiquement
      LOG_CHANNEL: stderr
      DB_CONNECTION: sqlite
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
    volumes:
      - storage_data:/var/www/html/storage
      - sqlite_data:/var/www/html/database
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  storage_data:
  sqlite_data:
